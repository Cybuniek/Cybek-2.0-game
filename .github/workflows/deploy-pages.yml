name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Skonfiguruj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Zainstaluj zaleznosci
        run: npm ci

      - name: Zbuduj projekt
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Skonfiguruj Pages
        uses: actions/configure-pages@v5

      - name: Przygotuj artefakt Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Opublikuj na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
